<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operation Iron Pixel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="app">

    <!-- ── CHARACTER SELECT OVERLAY ─────────────────── -->
    <div id="select-overlay" class="overlay">
      <div class="select-box">
        <div class="title-block">
          <h1>OPERATION<br>IRON PIXEL</h1>
          <p class="subtitle">YEAR 4089 — EARTH IS NEARLY DESTROYED</p>
          <p class="subtitle dim">Two soldiers emerge from the darkness.<br>Choose your operative.</p>
        </div>

        <div class="char-grid">
          <button id="btn-naveen" class="char-card naveen-card">
            <div class="char-portrait naveen-portrait">N</div>
            <h2>NAVEEN</h2>
            <p>Male Operative</p>
            <ul>
              <li>High speed run</li>
              <li>Heavy firepower</li>
              <li>10-frame animations</li>
            </ul>
          </button>

          <button id="btn-radhika" class="char-card radhika-card">
            <div class="char-portrait radhika-portrait">R</div>
            <h2>RADHIKA</h2>
            <p>Female Operative</p>
            <ul>
              <li>Agile dash</li>
              <li>Precise aim</li>
              <li>6-direction sprites</li>
            </ul>
          </button>
        </div>

        <div class="controls-hint">
          <span>← → MOVE</span>
          <span>SHIFT RUN</span>
          <span>↑ / Z JUMP</span>
          <span>↓ CROUCH</span>
          <span>↓+SHIFT SLIDE</span>
          <span>X / SPACE SHOOT</span>
        </div>
      </div>
    </div>

    <!-- ── GAME OVER OVERLAY ─────────────────────────── -->
    <div id="gameover-overlay" class="overlay hidden">
      <div class="gameover-box">
        <h1 class="gameover-title">GAME OVER</h1>
        <p class="score-display">FINAL SCORE: <span id="final-score">0</span></p>
        <button id="btn-restart" class="restart-btn">▶ PLAY AGAIN</button>
      </div>
    </div>

    <!-- ── GAME CANVAS ───────────────────────────────── -->
    <canvas id="game-canvas" width="960" height="540"></canvas>

  </div>

  <script src="game.js"></script>
</body>
</html>
